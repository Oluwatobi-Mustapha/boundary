version: "1.0"

settings:
  default_action: deny
  max_request_duration_hours: 12

# Define who the actors are.
# Secrets are now injected via Environment Variables.
subjects:
  groups:
    developers:
      id: "${BOUNDARY_DEVELOPERS_ID}"
      description: "Core App Developers"
    security_admins:
      id: "${BOUNDARY_SECURITY_ADMINS_ID}"
      description: "Cloud Security Team"

rules:
  # RULE 1: Production Read Only
  - id: "allow-dev-prod-ro"
    description: "Developers can request ReadOnly on production-tagged accounts"
    subjects: ["developers"]
    effect: allow
    target:
      selector: "tag"
      key: "Environment"
      values: ["Production", "Prod"]
    permission_set: "ReadOnlyAccess"
    constraints:
      max_duration_hours: 8
      ticket_required: false

  # RULE 2: Development PowerUser
  - id: "allow-dev-development-poweruser"
    description: "Developers can request PowerUser on development-tagged accounts"
    subjects: ["developers"]
    effect: allow
    target:
      selector: "tag"
      key: "Environment"
      values: ["Development", "Dev"]
    permission_set: "PowerUserAccess"
    constraints:
      max_duration_hours: 4
      ticket_required: false

  # RULE 3: Sandbox Admin
  - id: "allow-dev-sandbox-admin"
    description: "Developers can request Admin on Sandbox accounts"
    subjects: ["developers"]
    effect: allow
    target:
      selector: "tag"
      key: "Environment"
      values: ["Sandbox", "Playground"]
    permission_set: "AdministratorAccess"
    constraints:
      max_duration_hours: 1
      ticket_required: true
    approval:
      required: true
      approver_groups: ["security_admins"]
      channel: "#security-approvals"

  # RULE 4: Explicit Deny
  - id: "deny-dev-prod"
    description: "Explicitly forbid developers from Production OUs"
    subjects: ["developers"]
    effect: deny
    target:
      selector: "ou_id"
      ids: ["${PROD_OU_ID}"]
    permission_set: "*"
